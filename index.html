<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Promoção Exclusiva - Tatuagem</title>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '914033731557332');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=914033731557332&ev=PageView&noscript=1"
    /></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #333;
            border-radius: 20px;
            background: linear-gradient(145deg, #111, #080808);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            color: #ff3e3e;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .loading-bar-container {
            width: 100%;
            background-color: #222;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff3e3e, #ff8e8e);
            border-radius: 10px;
            animation: progress 3.5s forwards;
        }
        .status-text {
            font-size: 0.8rem;
            color: #ff3e3e;
            font-weight: bold;
            text-transform: uppercase;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #ff3e3e;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }
    </style>

    <script>
        const phoneNumber = "5598986291640";
        const message = encodeURIComponent("Vim garantir minha tatuagem grátis da promoção!");
        const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${message}`;

        // Redirecionamento
        setTimeout(function() {
            // Dispara o evento de Lead antes de sair da página
            if(typeof fbq === 'function') {
                fbq('track', 'Lead');
            }
            window.location.href = whatsappUrl;
        }, 3500); 
    </script>
</head>
<body>

    <div class="glow"></div>

    <div class="card">
        <div class="icon-box">✒️</div>
        <h1>Promoção Ativa!</h1>
        <p>Aguarde enquanto validamos seu interesse na <strong>Tatuagem Grátis</strong>. <br>Você será redirecionado para o agendamento.</p>
        
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="status-text">Conectando ao Estúdio...</div>
    </div>

</body>
</html>
