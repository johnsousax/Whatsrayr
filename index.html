<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecionando...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #25D366; /* Cor do WhatsApp */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.2rem; font-weight: 500; }
        p { color: #666; font-size: 0.9rem; }
    </style>

    <script>
        // Configurações
        const phoneNumber = "5598986291640";
        const message = encodeURIComponent("Vim garantir minha tatuagem grátis da promoção!");
        const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${message}`;

        // Redirecionamento com delay para camuflagem leve
        setTimeout(function() {
            window.location.href = whatsappUrl;
        }, 2500); // 2.5 segundos
    </script>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>Aguarde um momento...</h1>
        <p>Você está sendo redirecionado para o atendimento oficial.</p>
        
        <noscript>
            <a href="https://api.whatsapp.com/send?phone=5598986291640&text=Vim%20garantir%20minha%20tatuagem%20gr%C3%A1tis%20da%20pomo%C3%A7%C3%A3o!">
                Clique aqui se não for redirecionado.
            </a>
        </noscript>
    </div>

</body>
</html>
